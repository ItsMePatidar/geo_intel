server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large request bodies (e.g. GeoJSON polygons for spatial queries).
    client_max_body_size 100m;

    # Proxy all /api calls to the backend container.
    # The frontend uses relative /api paths (no hardcoded hostname).
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # React SPA — serve index.html for every unmatched path
    location / {
        try_files $uri $uri/ /index.html;
    }
}
